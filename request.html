<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Relief Request</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Flood Relief Request Form</h2>
    
    <div class="alert">
        Your relief request has been created successfully.
    </div>

    <form action="process_request.php" method="POST">
        <div class="form-group">
            <label>Type of Relief</label>
            <select name="relief_type" required>
                <option value="Food">Food</option>
                <option value="Water">Water</option>
                <option value="Medicine">Medicine</option>
                <option value="Shelter">Shelter</option>
            </select>
        </div>

        <div class="form-group">
            <label>District</label>
            <input type="text" name="district" required>
        </div>

        <div class="form-group">
            <label>Divisional Secretariat</label>
            <input type="text" name="ds" required>
        </div>

        <div class="form-group">
            <label>GN Division</label>
            <input type="text" name="gn" required>
        </div>

        <hr>
        <h3>Household Details</h3>

        <div class="form-group">
            <label>Contact Person Name</label>
            <input type="text" name="contact_name" required>
        </div>

        <div class="form-group">
            <label>Contact Number</label>
            <input type="text" name="phone" required>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="address" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>Number of Family Members</label>
            <input type="number" name="family_count" required>
        </div>

        <div class="form-group">
            <label>Flood Severity Level</label>
            <select name="severity">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
            </select>
        </div>

        <div class="form-group">
            <label>Description (Special Requirements)</label>
            <textarea name="description" rows="3"></textarea>
        </div>

        <button type="submit">Submit Request</button>
    </form>
</div>

</body>
</html>
