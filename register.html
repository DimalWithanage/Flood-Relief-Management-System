<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Register for the Flood Relief Management System to submit flood relief requests.">
    <title>Register - Flood Relief Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Create Account</h1>
            <p class="subtitle">Register as an affected person</p>

            <form id="registerForm">
                <div class="form-group">
                    <label for="regName">Full Name</label>
                    <input type="text" id="regName" name="full_name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" name="password" placeholder="Minimum 6 characters" required
                        minlength="6">
                </div>
                <div class="form-group">
                    <label for="regPhone">Phone Number</label>
                    <input type="tel" id="regPhone" name="phone" placeholder="Enter phone number" required>
                </div>
                <div class="form-group">
                    <label for="regAddress">Address</label>
                    <input type="text" id="regAddress" name="address" placeholder="Enter your address" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="registerBtn">Register</button>
            </form>

            <p class="text-center mt-2">
                Already have an account? <a href="index.html">Login here</a>
            </p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
